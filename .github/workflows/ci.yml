name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Build contracts
        run: forge build --offline
      - name: Run Foundry tests
        run: forge test --offline
      - name: Run local anvil e2e script
        run: ./script/anvil_e2e.sh

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Build frontend
        run: npm run build

  real-data-replay:
    runs-on: ubuntu-latest
    if: ${{ secrets.REALDATA_FIXTURE_JSON_B64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Replay recorded real-data fixtures
        env:
          REALDATA_FIXTURE_JSON_B64: ${{ secrets.REALDATA_FIXTURE_JSON_B64 }}
        run: ./script/ci_real_data_replay.sh

  unichain-smoke:
    runs-on: ubuntu-latest
    if: ${{ secrets.UNICHAIN_SMOKE_DEPLOYMENT_B64 != '' && secrets.UNICHAIN_SMOKE_RPC_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Run Unichain Sepolia smoke checks
        env:
          UNICHAIN_SMOKE_DEPLOYMENT_B64: ${{ secrets.UNICHAIN_SMOKE_DEPLOYMENT_B64 }}
          UNICHAIN_SMOKE_RPC_URL: ${{ secrets.UNICHAIN_SMOKE_RPC_URL }}
          UNICHAIN_SMOKE_USER: ${{ secrets.UNICHAIN_SMOKE_USER }}
          UNICHAIN_SMOKE_WORLD_PROOF_PAYLOAD: ${{ secrets.UNICHAIN_SMOKE_WORLD_PROOF_PAYLOAD }}
          UNICHAIN_SMOKE_SELF_ATTESTATION_PAYLOAD: ${{ secrets.UNICHAIN_SMOKE_SELF_ATTESTATION_PAYLOAD }}
          UNICHAIN_SMOKE_SELF_ATTESTATION_SIGNATURE: ${{ secrets.UNICHAIN_SMOKE_SELF_ATTESTATION_SIGNATURE }}
          UNICHAIN_SMOKE_SELF_PROOF_PAYLOAD: ${{ secrets.UNICHAIN_SMOKE_SELF_PROOF_PAYLOAD }}
          UNICHAIN_SMOKE_RELAYER_PK: ${{ secrets.UNICHAIN_SMOKE_RELAYER_PK }}
          UNICHAIN_SMOKE_EXPECT_SATISFIES: ${{ secrets.UNICHAIN_SMOKE_EXPECT_SATISFIES }}
        run: ./script/ci_unichain_smoke.sh
