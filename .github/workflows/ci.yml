name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Build contracts
        run: forge build --offline
      - name: Run Foundry tests
        run: forge test --offline
      - name: Run local anvil e2e script
        run: ./script/anvil_e2e.sh

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Build frontend
        run: npm run build

  real-data-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Replay recorded real-data fixtures
        env:
          REALDATA_FIXTURE_JSON_B64: ${{ secrets.REALDATA_FIXTURE_JSON_B64 }}
        run: ./script/ci_real_data_replay.sh
